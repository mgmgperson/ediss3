apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-service
  namespace: bookstore-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: book-service
  template:
    metadata:
      labels:
        app: book-service
    spec:
      containers:
        - name: book-service
          image: docker.io/mgperson/book-service:final7
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: DB_HOST
              value: "bookstore-db-dev.cluster-c2lz9iwywurz.us-east-1.rds.amazonaws.com"
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              value: "user4923870"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: book-db-secret
                  key: DB_PASSWORD
            - name: DB_NAME
              value: "books_db"
            - name: RECOMMENDATION_SERVICE_BASE_URL
              value: "http://34.195.107.7"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: book-llm-secret
                  key: GEMINI_API_KEY
            - name: GEMINI_MODEL
              value: "gemini-2.5-flash-lite"
          livenessProbe:
            httpGet:
              path: /status
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15