apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-service
  namespace: bookstore-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crm-service
  template:
    metadata:
      labels:
        app: crm-service
    spec:
      containers:
        - name: crm-service
          image: docker.io/mgperson/crm-service:latest
          imagePullPolicy: Always
          env:
            - name: KAFKA_BROKERS
              value: "98.88.99.206:9092,34.195.107.7:9092,54.221.160.63:9092"
            - name: KAFKA_TOPIC
              value: "aclin2.customer.evt"
            - name: KAFKA_CLIENT_ID
              value: "crm-service"
            - name: KAFKA_GROUP_ID
              value: "crm-service-group-v2"
            - name: SMTP_HOST
              value: "smtp.gmail.com"
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USER
              value: "edissaclin2@gmail.com"
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: crm-smtp-secret
                  key: SMTP_PASS
            - name: FROM_EMAIL
              value: "edissaclin2@gmail.com"
            - name: ANDREW_ID
              value: "aclin2"